<!-- ICONS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --dark:#0b2236;
  --accent:#00eaff;
  --danger:#ff3b3b;
  --bg:#ffffff;
  --text:#0a2433;
  --muted:#5e7d8f;
  --border:#dbeaf1;
}
*{box-sizing:border-box}

/* ===== NEW BACKGROUND ===== */
body{
  background: linear-gradient(135deg,#0b2236,#00364f);
}

/* ===== layout & UI ===== */
.comm-wrap{
  max-width:1700px;
  margin:20px auto;
  padding:30px;
  font-family:Inter,Segoe UI,system-ui;

  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(12px);
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* HEADER */
.portal-header{
  margin-bottom:25px;
  padding:20px 25px;
  border-radius:18px;
  background:linear-gradient(135deg,#004d66,#007c9c);
  color:#fff;
  box-shadow:0 12px 30px rgba(0,0,0,.3);
}

/* FILTER BAR */
.filter-bar{
  display:grid;
  grid-template-columns:repeat(3,1fr) 1.6fr 140px;
  gap:12px;
  margin-bottom:18px;

  background: rgba(255,255,255,0.03);
  padding:18px;
  border-radius:16px;
  backdrop-filter: blur(10px);
}

@media(max-width:768px){
  .filter-bar{grid-template-columns:1fr}
}

.filter-bar select,
.filter-bar input{
  padding:13px 14px;
  border-radius:12px;
  border:1px solid rgba(0,234,255,.5);
  background:#001f2e;
  color:#fff;
}

.filter-bar input::placeholder{color:#cdefff}

.filter-bar button{
  background: linear-gradient(135deg,#00eaff,#6ffff2);
  color:#001019;
  border:none;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,234,255,.4);
}

.filter-bar button:hover{
  transform:translateY(-2px);
  box-shadow:0 14px 30px rgba(0,234,255,.6);
}

.filter-item{
  display:flex;
  flex-direction:column;
}

.filter-item label{
  font-size:12px;
  font-weight:800;
  text-transform:uppercase;
  color:#e6faff;
  margin-bottom:6px;
}

/* BUTTON */
.ml-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:12px 22px;
  border-radius:14px;
  border:1px solid rgba(0,234,255,.35);
  background:linear-gradient(135deg,#00364f,#005f7a);
  color:#fff;
  font-weight:800;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.ml-btn:hover{
  transform:translateY(-2px);
}
</style>

<div class="comm-wrap">

  <!-- HEADER -->
  <div class="portal-header">
    <h2 style="margin:0;">📂 QHSSE Communication Hub</h2>
    <div style="opacity:.85; margin-top:6px; font-size:13px;">
      Fast access to Communication Pack documents
    </div>
  </div>

  <!-- FILTER -->
  <div class="filter-bar">

    <div class="filter-item">
      <label>Section</label>
      <select id="typeFilter">
        <option value="">All</option>
        <option value="HSSE">HSSE</option>
        <option value="Quality">Quality</option>
      </select>
    </div>

    <div class="filter-item">
      <label>Category</label>
      <select id="levelFilter">
        <option value="">All</option>
        <option value="HSE Alert">HSE Alert</option>
        <option value="HSE Lessons Learnt">HSE Lessons Learnt</option>
        <option value="HSE Moment">HSE Moment</option>
        <option value="HSE Rapid Communication">HSE Rapid Communication</option>
        <option value="Quality Communication Pack">Quality Communication Pack</option>
      </select>
    </div>

    <div class="filter-item">
      <label>Year</label>
      <input id="yearInput" placeholder="Enter Year (e.g. 2025)">
    </div>

    <input id="searchInput" placeholder="Search (optional)…">

    <button id="openBtn">Open Folder</button>

  </div>

  <!-- BUTTON -->
  <button class="ml-btn" id="masterBtn">
    <i class="fa-solid fa-folder-open"></i> Open Document Library
  </button>

</div>

<script>

/* ===== SHAREPOINT BASE ===== */
const SP_BASE = "https://miscbhd.sharepoint.com/sites/CHSSE/Document%20Library/COMMUNICATION%20PACK";

/* AUTO YEAR */
document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("yearInput").value = new Date().getFullYear();
});

/* OPEN FOLDER */
function openFolder(){

  const type = document.getElementById("typeFilter").value;
  const level = document.getElementById("levelFilter").value;
  const year = document.getElementById("yearInput").value.trim();

  let parts = [];

  if(type) parts.push(type);
  if(level) parts.push(level);
  if(year) parts.push(year);

  const path = parts.join("/");

  const fullUrl = SP_BASE + (path ? "/" + path : "");

  window.open(fullUrl, "_blank");
}

/* EVENTS */
document.getElementById("openBtn").addEventListener("click", openFolder);

document.getElementById("masterBtn").addEventListener("click", function(){
  window.open(SP_BASE, "_blank");
});

</script>
